name: CI

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: fmt / clippy / build / test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --locked

      - name: Build
        run: cargo build --release --all-targets --locked

      - name: Test
        run: cargo test --all --locked

  load:
    name: release load tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Run load tests sequentially
        env:
          CARGO_TERM_COLOR: never
        run: |
          set -o pipefail
          cargo test --release --locked --test load -- \
            --ignored --nocapture --test-threads=1 2>&1 \
            | tee "$RUNNER_TEMP/load-tests.txt"

      - name: Add load result to summary
        if: always()
        run: |
          {
            echo '### Release load tests'
            echo ''
            echo '```text'
            grep -E 'running [0-9]+ tests|test result:' "$RUNNER_TEMP/load-tests.txt" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload load test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-log
          path: ${{ runner.temp }}/load-tests.txt
          if-no-files-found: ignore
          retention-days: 14

  performance:
    name: performance (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      # There are deliberately no timing thresholds: shared-runner performance
      # is noisy. Panics and correctness failures still fail this job.
      - name: Run performance suite sequentially
        env:
          CARGO_TERM_COLOR: never
        run: |
          set -o pipefail
          cargo test --release --locked --test perf -- \
            --ignored --nocapture --test-threads=1 2>&1 \
            | tee "$RUNNER_TEMP/performance.txt"

      - name: Add metrics to summary
        if: always()
        run: |
          {
            echo '### Performance (informational)'
            echo ''
            echo '_Shared-runner results are noisy and do not gate on timing._'
            echo ''
            echo '```text'
            grep -E 'ops/sec|DURATION|^STORAGE|test result:' \
              "$RUNNER_TEMP/performance.txt" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-log
          path: ${{ runner.temp }}/performance.txt
          if-no-files-found: ignore
          retention-days: 14

  docker:
    name: docker build + smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t kvdb:ci .

      - name: Run container
        run: |
          docker run -d --name kvdb \
            -e KVDB_USER=admin -e KVDB_PASSWORD=secret \
            -p 6380:6380 -v kvdb-data:/data \
            kvdb:ci

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if [ "$(curl -s localhost:6380/health)" = "PONG" ]; then
              echo "healthy after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "server did not become healthy"; docker logs kvdb; exit 1

      - name: Smoke test the REST API
        run: |
          set -euo pipefail
          # Unauthenticated request must be rejected.
          code=$(curl -s -o /dev/null -w '%{http_code}' localhost:6380/v1/keys/city)
          [ "$code" = "401" ] || { echo "expected 401, got $code"; exit 1; }
          # PUT / GET / DELETE roundtrip.
          curl -sf -u admin:secret -X PUT localhost:6380/v1/keys/city -d Berlin
          [ "$(curl -sf -u admin:secret localhost:6380/v1/keys/city)" = "Berlin" ]
          curl -sf -u admin:secret -X DELETE localhost:6380/v1/keys/city
          # Data must persist across a container restart (the /data volume).
          curl -sf -u admin:secret -X PUT localhost:6380/v1/keys/persist -d kept
          docker restart kvdb
          for i in $(seq 1 30); do
            [ "$(curl -s localhost:6380/health)" = "PONG" ] && break || sleep 1
          done
          [ "$(curl -sf -u admin:secret localhost:6380/v1/keys/persist)" = "kept" ]
          echo "smoke test passed"

      - name: Container logs
        if: always()
        run: docker logs kvdb || true

      - name: Teardown
        if: always()
        run: docker rm -f kvdb || true
